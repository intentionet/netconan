[aliases]
test=pytest

[tool:pytest]
addopts = --cov=netconan
testpaths=tests

[bdist_wheel]
universal=1

[flake8]
filename=*.py,
extend-ignore=E203,E501,D401,W503
exclude=docs,__pychache__,.eggs,*.egg,build,virtualEnv,virtualEnv3

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

[mypy-configargparse.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-bidict.*]
ignore_missing_imports = True

[mypy-testfixtures.*]
ignore_missing_imports = True
